<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Faltas - Q-Acadêmico</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        
        h2 {
            text-align: center;
            color: #1e293b;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 700;
            font-size: 24px;
            letter-spacing: -0.5px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #475569;
        }
        
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            color: #1e293b;
            background-color: #f8fafc;
            transition: all 0.2s ease;
            outline: none;
        }
        
        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }
        
        button:active {
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .resultado-box {
            margin-top: 30px;
            padding: 24px;
            border-radius: 16px;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            display: none; /* Escondido até calcular */
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            animation: fadeIn 0.4s ease forwards;
        }
        
        .status-ok { color: #166534; background-color: #dcfce7; border: 1px solid #bbf7d0; }
        .status-alerta { color: #854d0e; background-color: #fef08a; border: 1px solid #fde047; }
        .status-reprovado { color: #991b1b; background-color: #fee2e2; border: 1px solid #fecaca; }
        
        .linha {
            border-bottom: 1px dashed #cbd5e1;
            margin: 12px 0;
            padding-bottom: 12px;
            color: #334155;
            line-height: 1.5;
        }
        
        .linha:last-of-type {
            border-bottom: none;
        }
        
        .mensagem-final {
            padding: 16px;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: 600;
            text-align: center;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora de Faltas</h2>
    
    <div class="form-group">
        <label for="disciplina">Nome da Disciplina:</label>
        <input type="text" id="disciplina" placeholder="Ex: Lógica, Design Digital">
    </div>

    <div class="form-group">
        <label for="aulas_previstas">Número de Aulas Previsto (Semestre):</label>
        <input type="number" id="aulas_previstas" value="80" min="1">
    </div>

    <div class="form-group">
        <label for="aulas_ministradas">Aulas Ministradas Até Agora:</label>
        <input type="number" id="aulas_ministradas" placeholder="Ex: 36" min="0">
    </div>

    <div class="form-group">
        <label for="tipo_falta">Como quer registrar as faltas?</label>
        <select id="tipo_falta" onchange="atualizarLabelFalta()">
            <option value="1">Por aulas avulsas (Ex: 3 faltas no portal)</option>
            <option value="2">Por dias de falta (1 dia = 3 aulas)</option>
        </select>
    </div>

    <div class="form-group">
        <label id="label_faltas" for="faltas_input">Faltas registradas no diário:</label>
        <input type="number" id="faltas_input" placeholder="Ex: 3" min="0">
    </div>

    <button onclick="calcularFaltas()">Calcular Status</button>

    <div id="resultado" class="resultado-box">
        </div>
</div>

<script>
    function atualizarLabelFalta() {
        const tipo = document.getElementById('tipo_falta').value;
        const label = document.getElementById('label_faltas');
        if (tipo === '2') {
            label.innerText = "Quantos DIAS completos você já faltou?";
        } else {
            label.innerText = "Faltas registradas no diário:";
        }
    }

    function calcularFaltas() {
        const disciplina = document.getElementById('disciplina').value || "Disciplina";
        const aulasPrevistas = parseInt(document.getElementById('aulas_previstas').value);
        const aulasMinistradas = parseInt(document.getElementById('aulas_ministradas').value);
        const tipoFalta = document.getElementById('tipo_falta').value;
        const faltasInput = parseInt(document.getElementById('faltas_input').value);

        if (isNaN(aulasPrevistas) || aulasPrevistas <= 0 || isNaN(aulasMinistradas) || isNaN(faltasInput)) {
            alert("Por favor, preencha todos os campos numéricos corretamente.");
            return;
        }

        let faltasAtuais = faltasInput;
        if (tipoFalta === '2') {
            faltasAtuais = faltasInput * 3;
        }

        // Lógica matemática
        const maxFaltas = Math.floor(aulasPrevistas * 0.25);
        const faltasRestantes = maxFaltas - faltasAtuais;
        
        const diasRestantes = Math.floor(faltasRestantes / 3);
        const aulasSobra = faltasRestantes % 3;

        const presencaPrevistaPerc = ((aulasPrevistas - faltasAtuais) / aulasPrevistas) * 100;
        const presencaMinistradaPerc = aulasMinistradas > 0 ? ((aulasMinistradas - faltasAtuais) / aulasMinistradas) * 100 : 100;

        // Montando o resultado visual
        const resultadoDiv = document.getElementById('resultado');
        resultadoDiv.style.display = 'block';

        let html = `<h3 style="margin-top:0; color:#1e293b; text-align:center; font-weight:700;">Status: ${disciplina.toUpperCase()}</h3>`;
        html += `<div class="linha"><b>Carga da disciplina:</b> ${aulasPrevistas} aulas<br><small style="color:#64748b;">(Limite máximo: ${maxFaltas} faltas)</small></div>`;
        
        // Lógica dinâmica para a explicação de dias e aulas
        let explicacaoDias = "";
        if (faltasRestantes > 0) {
            if (diasRestantes > 0 && aulasSobra === 0) {
                explicacaoDias = `(O exato equivalente a <b>${diasRestantes} dia(s) completo(s)</b> de falta).`;
            } else if (diasRestantes > 0 && aulasSobra > 0) {
                explicacaoDias = `(O equivalente a <b>${diasRestantes} dia(s) completo(s)</b> e <b>${aulasSobra} aula(s) avulsa(s)</b>).`;
            } else if (diasRestantes === 0 && faltasRestantes > 0) {
                explicacaoDias = `(Isso não chega a dar um dia letivo completo).`;
            }
        } else if (faltasRestantes < 0) {
            explicacaoDias = `(Você já passou do limite em ${Math.abs(faltasRestantes)} aula(s)).`;
        }

        html += `<div class="linha"><b>Faltas computadas no sistema:</b> ${faltasAtuais} aula(s)<br>`;
        html += `<b>Faltas que ainda pode ter:</b> ${faltasRestantes} aula(s)<br>`;
        if (explicacaoDias !== "") {
            html += `<i style="color:#475569; font-size: 0.9em; display: inline-block; margin-top: 4px;">➔ ${explicacaoDias}</i>`;
        }
        html += `</div>`;

        html += `<div class="linha"><b>Presença (Aulas Previstas):</b> ${presencaPrevistaPerc.toFixed(0)}%<br>`;
        html += `<b>Presença (Aulas Ministradas):</b> ${presencaMinistradaPerc.toFixed(0)}%</div>`;

        // Lógica de cores para o status final
        let classeMensagem = "";
        let textoMensagem = "";

        if (faltasRestantes > 0) {
            classeMensagem = "status-ok";
            textoMensagem = `✅ Tranquilo! Ainda há margem para ${faltasRestantes} falta(s).`;
        } else if (faltasRestantes === 0) {
            classeMensagem = "status-alerta";
            textoMensagem = `⚠️ ATENÇÃO: Limite atingido! Não é possível faltar mais nenhuma vez sem reprovar.`;
        } else {
            classeMensagem = "status-reprovado";
            textoMensagem = `❌ REPROVAÇÃO: O limite foi ultrapassado em ${Math.abs(faltasRestantes)} falta(s).`;
        }

        html += `<div class="mensagem-final ${classeMensagem}">${textoMensagem}</div>`;

        resultadoDiv.innerHTML = html;
    }
</script>

</body>
</html>
