<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Faltas Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617);
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }
        
        .scene {
            perspective: 1500px;
            width: 100%;
            max-width: 500px;
        }
        
        .card {
            width: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            display: grid;
        }
        
        .card.is-flipped {
            transform: rotateY(180deg);
        }
        
        .card-face {
            grid-area: 1 / 1;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 24px;
            padding: 40px;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .card-back {
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        h2 {
            text-align: center;
            color: #f8fafc;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 800;
            font-size: 26px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: #cbd5e1;
        }
        
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 16px;
            color: #f8fafc;
            background-color: rgba(15, 23, 42, 0.8);
            transition: all 0.3s ease;
            outline: none;
        }
        
        ::placeholder {
            color: #475569;
        }
        
        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            background-color: rgba(15, 23, 42, 1);
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px -5px rgba(59, 130, 246, 0.7);
            background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
        }
        
        button:active {
            transform: translateY(0);
        }

        .btn-voltar {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: none;
            margin-top: 25px;
        }

        .btn-voltar:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .linha {
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            margin: 14px 0;
            padding-bottom: 14px;
            color: #e2e8f0;
            line-height: 1.6;
        }
        
        .linha:last-of-type {
            border-bottom: none;
        }
        
        .destaque-numero {
            font-size: 1.1em;
            font-weight: 800;
            color: #fff;
        }

        /* Novo estilo para o destaque enorme de DIAS RESTANTES */
        .destaque-dias-gigante {
            display: block;
            font-size: 2.2em;
            font-weight: 800;
            color: #60a5fa; /* Azul vibrante para destacar a informação mais importante */
            margin-top: 4px;
            margin-bottom: 2px;
            text-shadow: 0 2px 10px rgba(59, 130, 246, 0.3);
        }

        .mensagem-final {
            padding: 18px;
            border-radius: 12px;
            margin-top: 20px;
            font-weight: 700;
            text-align: center;
            font-size: 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        .status-ok { 
            color: #86efac; 
            background-color: rgba(22, 101, 52, 0.4); 
            border: 1px solid rgba(74, 222, 128, 0.3);
        }
        .status-alerta { 
            color: #fde047; 
            background-color: rgba(133, 77, 14, 0.4); 
            border: 1px solid rgba(250, 204, 21, 0.3);
        }
        .status-reprovado { 
            color: #fca5a5; 
            background-color: rgba(153, 27, 27, 0.4); 
            border: 1px solid rgba(248, 113, 113, 0.3);
        }
    </style>
</head>
<body>

<div class="scene">
    <div class="card" id="card-principal">
        
        <div class="card-face card-front">
            <h2>Calculadora de Faltas</h2>
            
            <div class="form-group">
                <label for="disciplina">Nome da Disciplina:</label>
                <input type="text" id="disciplina" placeholder="Ex: Lógica, Design Digital">
            </div>

            <div class="form-group">
                <label for="aulas_previstas">Número de Aulas Previsto (Semestre):</label>
                <input type="number" id="aulas_previstas" value="80" min="1">
            </div>

            <div class="form-group">
                <label for="aulas_ministradas">Aulas Ministradas Até Agora:</label>
                <input type="number" id="aulas_ministradas" placeholder="Ex: 36" min="0">
            </div>

            <div class="form-group">
                <label for="tipo_falta">Como quer registrar as faltas?</label>
                <select id="tipo_falta" onchange="atualizarLabelFalta()">
                    <option value="1">Por dias de falta (1 dia = 3 aulas)</option>
                    <option value="2">Por aulas avulsas (Ex: 3 faltas no portal)</option>
                </select>
            </div>

            <div class="form-group">
                <label id="label_faltas" for="faltas_input">Quantos DIAS completos você já faltou?</label>
                <input type="number" id="faltas_input" placeholder="Ex: 1" min="0">
            </div>

            <button onclick="calcularFaltas()">Analisar Situação</button>
        </div>

        <div class="card-face card-back">
            <div id="resultado-conteudo">
                </div>
            <button class="btn-voltar" onclick="virarCard()">Nova Consulta ⟲</button>
        </div>

    </div>
</div>

<script>
    function atualizarLabelFalta() {
        const tipo = document.getElementById('tipo_falta').value;
        const label = document.getElementById('label_faltas');
        if (tipo === '1') {
            label.innerText = "Quantos DIAS completos você já faltou?";
        } else {
            label.innerText = "Faltas registradas no diário (Aulas Avulsas):";
        }
    }

    function virarCard() {
        const card = document.getElementById('card-principal');
        card.classList.toggle('is-flipped');
    }

    function calcularFaltas() {
        const disciplina = document.getElementById('disciplina').value || "Sua Disciplina";
        const aulasPrevistas = parseInt(document.getElementById('aulas_previstas').value);
        const aulasMinistradas = parseInt(document.getElementById('aulas_ministradas').value);
        const tipoFalta = document.getElementById('tipo_falta').value;
        const faltasInput = parseInt(document.getElementById('faltas_input').value);

        if (isNaN(aulasPrevistas) || aulasPrevistas <= 0 || isNaN(aulasMinistradas) || isNaN(faltasInput)) {
            alert("Por favor, preencha todos os campos numéricos corretamente para gerar o relatório.");
            return;
        }

        let faltasAtuais = faltasInput;
        // Agora tipo '1' é Dias e tipo '2' é Aulas Avulsas, conforme o HTML que você mandou
        if (tipoFalta === '1') {
            faltasAtuais = faltasInput * 3;
        }

        const maxFaltas = Math.floor(aulasPrevistas * 0.25);
        const faltasRestantes = maxFaltas - faltasAtuais;
        
        const diasRestantes = Math.floor(faltasRestantes / 3);
        const aulasSobra = faltasRestantes % 3;

        const presencaPrevistaPerc = ((aulasPrevistas - faltasAtuais) / aulasPrevistas) * 100;
        const presencaMinistradaPerc = aulasMinistradas > 0 ? ((aulasMinistradas - faltasAtuais) / aulasMinistradas) * 100 : 100;

        let html = `<h2>Status: <span style="color:#60a5fa">${disciplina.toUpperCase()}</span></h2>`;
        html += `<div class="linha" style="text-align: center; border-bottom: none;">`;
        html += `<span style="color:#94a3b8; font-weight: 500; font-size: 1.1em;">Você ainda pode faltar:</span>`;
        
        // A mágica acontece aqui: Lógica focada em DIAS
        if (faltasRestantes > 0) {
            html += `<span class="destaque-dias-gigante">${diasRestantes} DIA(S)</span>`;
            if (aulasSobra > 0) {
                 html += `<span style="color:#e2e8f0; font-weight: 600; font-size: 1.2em;">e ${aulasSobra} aula(s)</span><br>`;
            }
            html += `<i style="color:#64748b; font-size: 0.9em; display: inline-block; margin-top: 8px;">(Total em aulas: ${faltasRestantes} de ${maxFaltas} permitidas)</i>`;
        } else if (faltasRestantes === 0) {
            html += `<span class="destaque-dias-gigante" style="color: #fde047;">0 DIAS</span>`;
             html += `<i style="color:#64748b; font-size: 0.9em; display: inline-block; margin-top: 8px;">(Você atingiu exatamente o limite de ${maxFaltas} aulas)</i>`;
        } else {
            html += `<span class="destaque-dias-gigante" style="color: #fca5a5;">ULTRAPASSADO</span>`;
            html += `<i style="color:#64748b; font-size: 0.9em; display: inline-block; margin-top: 8px;">(Passou do limite em ${Math.abs(faltasRestantes)} aula(s))</i>`;
        }
        html += `</div>`;

        html += `<div class="linha">Faltas já registradas: <span class="destaque-numero">${faltasAtuais} aula(s)</span></div>`;

        html += `<div class="linha">Presença (Previstas): <span class="destaque-numero">${presencaPrevistaPerc.toFixed(0)}%</span><br>`;
        html += `Presença (Ministradas): <span class="destaque-numero">${presencaMinistradaPerc.toFixed(0)}%</span></div>`;

        let classeMensagem = "";
        let textoMensagem = "";

        if (faltasRestantes > 0) {
            classeMensagem = "status-ok";
            textoMensagem = `✅ Você está seguro!`;
        } else if (faltasRestantes === 0) {
            classeMensagem = "status-alerta";
            textoMensagem = `⚠️ CUIDADO: Limite máximo atingido!`;
        } else {
            classeMensagem = "status-reprovado";
            textoMensagem = `❌ REPROVAÇÃO: O limite foi ultrapassado.`;
        }

        html += `<div class="mensagem-final ${classeMensagem}">${textoMensagem}</div>`;

        document.getElementById('resultado-conteudo').innerHTML = html;
        virarCard();
    }
    
    // Iniciar a label corretamente com base no select padrão
    window.onload = atualizarLabelFalta;
</script>

</body>
</html>
